name: Release

on:
  push:
    tags: 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-22.04
            os-label: linux
            arch: amd64
          - target: linux-arm64
            runner: ubuntu-22.04-arm
            os-label: linux
            arch: arm64
          - target: android-arm64
            runner: ubuntu-22.04
            os-label: android
            arch: arm64
          - target: darwin-arm64
            runner: macos-latest
            os-label: darwin
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 2.2.10
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies (Linux native)
        if: runner.os == 'Linux' && matrix.os-label != 'android'
        run: |
          sudo apt-get update -qq -o Acquire::Retries=3 -o Acquire::http::Timeout=30
          sudo apt-get install -y -qq --fix-missing -o Acquire::Retries=3 \
            pkg-config libdbus-1-dev nasm libasound2-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ffmpeg pkg-config

      - name: Build static FFmpeg (Linux)
        if: runner.os == 'Linux' && matrix.os-label != 'android'
        run: |
          curl -sL https://ffmpeg.org/releases/ffmpeg-7.1.tar.gz | tar xz
          cd ffmpeg-7.1
          ./configure --enable-static --disable-shared --enable-pic \
            --prefix=/tmp/ffmpeg-prefix \
            --disable-programs --disable-doc --disable-ffplay --disable-ffprobe \
            --disable-encoders --disable-muxers --disable-devices --disable-filters \
            --disable-bsfs --disable-postproc --disable-network \
            --enable-decoder='mp3*,aac*,flac,vorbis,opus,pcm*,wmav*,wmapro,ape,wavpack,tta,alac,dca,dts*,ac3*,eac3,truehd,dsd*,cook,speex,nellymoser,adpcm*,atrac3*,mlp,sipr,tak,twinvq,binkaudio*,mp1,mp2,qdm2,qdmc,mace*,g723*,g729,gsm*' \
            --enable-demuxer='*' --enable-parsers --enable-protocol=file \
            --enable-swresample
          make -j$(nproc)
          make install
          echo "PKG_CONFIG_PATH=/tmp/ffmpeg-prefix/lib/pkgconfig" >> $GITHUB_ENV

      - name: Build static binaries (Linux)
        if: runner.os == 'Linux' && matrix.os-label != 'android'
        run: |
          mkdir -p bin
          nim c -d:release -d:staticFfmpeg --nimcache:/tmp/nimcache src/gtmd.nim
          nim c -d:release -d:staticFfmpeg --nimcache:/tmp/nimcache src/gtm.nim

      - name: Build Android cross-compile Docker image
        if: matrix.os-label == 'android'
        run: |
          docker build -t gtm-android-builder .

      - name: Build static binaries (Android via Docker)
        if: matrix.os-label == 'android'
        run: |
          docker run --rm -v $PWD:/src -v /tmp/nimcache:/tmp/nimcache \
            gtm-android-builder \
            sh -c "mkdir -p /src/bin && \
              cd /src && \
              nim c -d:release -d:staticFfmpeg -d:android \
                --gcc.exe:aarch64-linux-android28-clang \
                --gcc.linkerexe:aarch64-linux-android28-clang \
                --clang.exe:aarch64-linux-android28-clang \
                --clang.linkerexe:aarch64-linux-android28-clang \
                --nimcache:/tmp/nimcache src/gtmd.nim && \
              nim c -d:release -d:staticFfmpeg -d:android \
                --gcc.exe:aarch64-linux-android28-clang \
                --gcc.linkerexe:aarch64-linux-android28-clang \
                --clang.exe:aarch64-linux-android28-clang \
                --clang.linkerexe:aarch64-linux-android28-clang \
                --nimcache:/tmp/nimcache src/gtm.nim"

      - name: Run termux-elf-cleaner (Android)
        if: matrix.os-label == 'android'
        run: |
          set -eu
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64|amd64) TEC_ARCH="x86_64" ;;
            aarch64|arm64) TEC_ARCH="aarch64" ;;
            *) echo "Unknown arch $ARCH"; exit 1 ;;
          esac
          curl -sL "https://github.com/termux/termux-elf-cleaner/releases/latest/download/termux-elf-cleaner-linux-${TEC_ARCH}.tar.gz" -o /tmp/tec.tar.gz
          tar xzf /tmp/tec.tar.gz -C /tmp
          /tmp/termux-elf-cleaner bin/gtm bin/gtmd

      - name: Verify static binary (Linux)
        if: runner.os == 'Linux' && matrix.os-label != 'android'
        run: |
          set -eu
          for bin in bin/gtm bin/gtmd; do
            echo "--- $bin ---"
            max=$(readelf -V "$bin" 2>/dev/null | grep 'GLIBC_' | sed 's/.*GLIBC_//; s/[^0-9.].*//' | sort -V | tail -1)
            echo "  max GLIBC: $max"
            if [ "$(printf '%s\n' "2.38" "$max" | sort -V | tail -1)" != "2.38" ]; then
              echo "ERROR: $bin requires GLIBC_$max > 2.38"
              exit 1
            fi
            echo "  linked libraries:"
            ldd "$bin" | grep '=> /' | awk '{print "    " $1 " -> " $3}'
            echo "  OK"
          done

      - name: Build dynamic binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p bin
          nim c -d:release --nimcache:/tmp/nimcache src/gtmd.nim
          nim c -d:release --nimcache:/tmp/nimcache src/gtm.nim

      - name: Bundle shared libraries (macOS)
        if: runner.os == 'macOS'
        run: |
          set +e
          mkdir -p /tmp/bundled-libs
          for bin in bin/gtm bin/gtmd; do
            for lib in $(otool -L "$bin" | grep -E '(libavformat|libavcodec|libavutil|libswresample)' | awk '{print $1}'); do
              [ -f "$lib" ] && cp -nL "$lib" /tmp/bundled-libs/ 2>/dev/null
            done
          done
          for bin in bin/gtm bin/gtmd; do
            for lib in $(otool -L "$bin" | grep -E '(libavformat|libavcodec|libavutil|libswresample)' | awk '{print $1}'); do
              base=$(basename "$lib")
              install_name_tool -change "$lib" "@rpath/$base" "$bin" 2>/dev/null
            done
            install_name_tool -add_rpath "@executable_path" "$bin" 2>/dev/null || true
          done
          for dylib in /tmp/bundled-libs/*.dylib; do
            [ -f "$dylib" ] || continue
            for dep in $(otool -L "$dylib" | grep -E '(libavformat|libavcodec|libavutil|libswresample)' | awk '{print $1}' | grep -v '^@'); do
              base=$(basename "$dep")
              install_name_tool -change "$dep" "@rpath/$base" "$dylib" 2>/dev/null
            done
            chmod 644 "$dylib" 2>/dev/null
          done

      - name: Build manpage
        if: matrix.os-label != 'android'
        run: |
          if command -v pandoc >/dev/null 2>&1; then
            if [ -f docs/gtm.1.md ]; then
              mkdir -p bin
              pandoc docs/gtm.1.md -s -t man -o bin/gtm.1
            fi
          fi

      - name: Package
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          TARGET="${{ matrix.os-label }}-${{ matrix.arch }}"

          mkdir -p dist/gtm-full dist/gtmd
          cp bin/gtm  dist/gtm-full/
          cp bin/gtmd dist/gtm-full/
          cp bin/gtmd dist/gtmd/
          BLIBS=""
          if [ -d /tmp/bundled-libs ]; then
            BLIBS=/tmp/bundled-libs
          elif [ -d bundled-libs ]; then
            BLIBS=bundled-libs
          fi
          if [ -n "$BLIBS" ]; then
            cp "$BLIBS"/*.dylib dist/gtm-full/ 2>/dev/null || true
            cp "$BLIBS"/*.dylib dist/gtmd/ 2>/dev/null || true
          fi
          if [ -f bin/gtm.1 ]; then
            cp bin/gtm.1 dist/gtm-full/
          fi
          tar czf "dist/gtm-full-${TARGET}.tar.gz" -C dist/gtm-full .
          tar czf "dist/gtmd-${TARGET}.tar.gz"     -C dist/gtmd .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gtm-full-*.tar.gz
            dist/gtmd-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
