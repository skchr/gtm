name: Release

on:
  push:
    tags: 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-22.04
            os-label: linux
            arch: amd64
          - target: linux-arm64
            runner: ubuntu-22.04-arm
            os-label: linux
            arch: arm64
          - target: darwin-arm64
            runner: macos-latest
            os-label: darwin
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nim
        if: matrix.docker == ''
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 2.2.2
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux' && matrix.docker == ''
        run: |
          sudo apt-get update -qq -o Acquire::Retries=3 -o Acquire::http::Timeout=30
          sudo apt-get install -y -qq --fix-missing -o Acquire::Retries=3 \
            libavformat-dev libavcodec-dev libavutil-dev \
            libswresample-dev libasound2-dev libdbus-1-dev
          # nim-dbus is vendored at vendor/nim-dbus/ — no external clone needed

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ffmpeg pkg-config

      - name: Build dynamic binaries
        if: matrix.docker == ''
        run: |
          mkdir -p bin
          nim c -d:release --nimcache:/tmp/nimcache-dynamic src/gtmd.nim
          nim c -d:release --nimcache:/tmp/nimcache-dynamic src/gtm.nim

      - name: Bundle shared libraries (Linux)
        if: runner.os == 'Linux' && matrix.docker == ''
        run: |
          sudo apt-get install -y -qq patchelf
          mkdir -p /tmp/bundled-libs
          for bin in bin/gtm bin/gtmd; do
            for lib in $(ldd "$bin" | awk '{print $3}' | grep -E '/(libav|libswresample|libasound)'); do
              [ -n "$lib" ] && [ -f "$lib" ] && cp -nL "$lib" /tmp/bundled-libs/
            done
          done
          for lib in /tmp/bundled-libs/lib*.so*; do
            [ -f "$lib" ] || continue
            for dep in $(ldd "$lib" 2>/dev/null | awk '{print $3}' | grep -E '/(libav|libswresample|libasound)'); do
              [ -n "$dep" ] && [ -f "$dep" ] && cp -nL "$dep" /tmp/bundled-libs/
            done
          done
          patchelf --set-rpath '$ORIGIN' bin/gtm bin/gtmd

      - name: Verify library dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          set -eu
          issues=0
          for bin in bin/gtm bin/gtmd; do
            echo "--- $bin ---"
            # 1) Check glibc version requirement (target: 2.38+)
            max=$(readelf -V "$bin" 2>/dev/null | grep 'GLIBC_' | sed 's/.*GLIBC_//; s/[^0-9.].*//' | sort -V | tail -1)
            echo "  max GLIBC: $max"
            if [ "$(printf '%s\n' "2.38" "$max" | sort -V | head -1)" != "2.38" ]; then
              echo "ERROR: $bin requires GLIBC_$max > 2.38"
              issues=$((issues + 1))
            fi
            # 2) Check for unresolved shared libraries
            ldd "$bin" | grep -q 'not found' && {
              echo "ERROR: missing shared library dependencies in $bin:"
              ldd "$bin" | grep 'not found'
              issues=$((issues + 1))
            } || true
            # 3) List all linked libs for manual inspection
            echo "  linked libraries:"
            ldd "$bin" | grep '=> /' | awk '{print "    " $1 " -> " $3}'
          done
          # 4) Verify bundled FFmpeg/ALSA libs are present
          echo "--- bundled libs ---"
          ls -la /tmp/bundled-libs/ 2>/dev/null || echo "  (none)"
          if [ $issues -gt 0 ]; then
            echo "FAILED: $issues issue(s) found"
            exit 1
          fi
          echo "OK: all dependency checks passed"

      - name: Bundle shared libraries (macOS)
        if: runner.os == 'macOS'
        run: |
          set +e
          mkdir -p /tmp/bundled-libs
          for bin in bin/gtm bin/gtmd; do
            for lib in $(otool -L "$bin" | grep -E '(libavformat|libavcodec|libavutil|libswresample)' | awk '{print $1}'); do
              [ -f "$lib" ] && cp -nL "$lib" /tmp/bundled-libs/ 2>/dev/null
            done
          done
          for bin in bin/gtm bin/gtmd; do
            for lib in $(otool -L "$bin" | grep -E '(libavformat|libavcodec|libavutil|libswresample)' | awk '{print $1}'); do
              base=$(basename "$lib")
              install_name_tool -change "$lib" "@rpath/$base" "$bin" 2>/dev/null
            done
            install_name_tool -add_rpath "@executable_path" "$bin" 2>/dev/null || true
          done
          for dylib in /tmp/bundled-libs/*.dylib; do
            [ -f "$dylib" ] || continue
            for dep in $(otool -L "$dylib" | grep -E '(libavformat|libavcodec|libavutil|libswresample)' | awk '{print $1}' | grep -v '^@'); do
              base=$(basename "$dep")
              install_name_tool -change "$dep" "@rpath/$base" "$dylib" 2>/dev/null
            done
            chmod 644 "$dylib" 2>/dev/null
          done

      - name: Build manpage
        run: |
          if command -v pandoc >/dev/null 2>&1; then
            if [ -f docs/gtm.1.md ]; then
              mkdir -p bin
              pandoc docs/gtm.1.md -s -t man -o bin/gtm.1
            fi
          fi

      - name: Package
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          TARGET="${{ matrix.os-label }}-${{ matrix.arch }}"

          # --- Dynamic bundled variant ---
          mkdir -p dist/gtm-full dist/gtmd
          cp bin/gtm  dist/gtm-full/
          cp bin/gtmd dist/gtm-full/
          cp bin/gtmd dist/gtmd/
          BLIBS=""
          if [ -d /tmp/bundled-libs ]; then
            BLIBS=/tmp/bundled-libs
          elif [ -d bundled-libs ]; then
            BLIBS=bundled-libs
          fi
          if [ -n "$BLIBS" ]; then
            cp "$BLIBS"/*.so* dist/gtm-full/ 2>/dev/null || true
            cp "$BLIBS"/*.dylib dist/gtm-full/ 2>/dev/null || true
            cp "$BLIBS"/*.so* dist/gtmd/ 2>/dev/null || true
            cp "$BLIBS"/*.dylib dist/gtmd/ 2>/dev/null || true
          fi
          if [ -f bin/gtm.1 ]; then
            cp bin/gtm.1 dist/gtm-full/
          fi
          tar czf "dist/gtm-full-${TARGET}.tar.gz" -C dist/gtm-full .
          tar czf "dist/gtmd-${TARGET}.tar.gz"     -C dist/gtmd .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gtm-full-*.tar.gz
            dist/gtmd-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
