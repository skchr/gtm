name: Release

on:
  push:
    tags: 'v*'

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            os-label: linux
            arch: amd64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            os-label: linux
            arch: arm64
          - target: darwin-amd64
            runner: macos-13
            os-label: darwin
            arch: amd64
          - target: darwin-arm64
            runner: macos-latest
            os-label: darwin
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 2.2.2
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libavformat-dev libavcodec-dev libavutil-dev \
            libswresample-dev libasound2-dev libdbus-1-dev
          git clone --depth 1 https://github.com/zielmicha/nim-dbus /tmp/nim-dbus

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ffmpeg pkg-config

      - name: Build daemon
        run: nim c -d:release src/gtmd.nim

      - name: Build TUI
        run: nim c -d:release src/gtm.nim

      - name: Build manpage
        run: |
          if command -v pandoc >/dev/null 2>&1; then
            if [ -f docs/gtm.1.md ]; then
              mkdir -p bin
              pandoc docs/gtm.1.md -s -t man -o bin/gtm.1
            fi
          fi

      - name: Package
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          TARGET="${{ matrix.os-label }}-${{ matrix.arch }}"
          mkdir -p dist/gtm-full dist/gtmd

          cp bin/gtm    dist/gtm-full/
          cp bin/gtmd   dist/gtm-full/ dist/gtmd/
          if [ -f bin/gtm.1 ]; then
            cp bin/gtm.1 dist/gtm-full/
          fi

          tar czf "dist/gtm-full-${VERSION}-${TARGET}.tar.gz"   -C dist/gtm-full .
          tar czf "dist/gtmd-${VERSION}-${TARGET}.tar.gz"       -C dist/gtmd .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gtm-full-*.tar.gz
            dist/gtmd-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
